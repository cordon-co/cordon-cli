name: Tag Patch On Merge

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: patch-tag-main
  cancel-in-progress: false

jobs:
  tag-patch:
    name: Create next patch tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate tag push token
        env:
          TAG_PUSH_TOKEN: ${{ secrets.CORDON_TAG_PUSH_TOKEN }}
        run: |
          if [ -z "${TAG_PUSH_TOKEN}" ]; then
            echo "Missing secret CORDON_TAG_PUSH_TOKEN."
            echo "Set a PAT secret so pushed tags trigger the Release workflow."
            exit 1
          fi

      - name: Compute and create next patch tag
        env:
          TAG_PUSH_TOKEN: ${{ secrets.CORDON_TAG_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"

          if [ -z "${latest_tag}" ]; then
            major=0
            minor=1
            patch=0
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"

            if [ -z "${major}" ] || [ -z "${minor}" ] || [ -z "${patch}" ]; then
              echo "Latest tag '${latest_tag}' is not in vX.Y.Z format"
              exit 1
            fi
          fi

          next_patch=$((patch + 1))
          new_tag="v${major}.${minor}.${next_patch}"

          if git rev-parse -q --verify "refs/tags/${new_tag}" >/dev/null; then
            echo "Tag ${new_tag} already exists; nothing to do"
            exit 0
          fi

          target_sha="${GITHUB_SHA}"
          git tag -a "${new_tag}" "${target_sha}" -m "Release ${new_tag}"
          git remote set-url origin "https://x-access-token:${TAG_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "${new_tag}"

          echo "Created ${new_tag} on ${target_sha}"
